name = "test_led"
description = "SparkFun Pro Micro RP2040 LED Test"
version = "1.0.0"

executables = ["test_led"]

[[depends-on]]
light_tasking_rp2040 = "*"
rp2040_hal = "^2"
rp2040_boards = "^2"

[configuration.values]
rp2040_hal.Use_Startup = false
rp2040_hal.Interrupts = "bb_runtimes"
light_tasking_rp2040.Max_CPUs = 2
light_tasking_rp2040.Board = "sparkfun_promicro"

[[actions]]
type = "post-build"
command = ["sh", "-c", "./postbuild.sh"]
